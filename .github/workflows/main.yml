name: Flight Scout Daily Run

on:
  schedule:
    - cron: "0 6 * * *"  # 08:00 ישראל (UTC+2 בערך)
  workflow_dispatch:  # מאפשר להריץ ידנית

jobs:
  run-scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Run script
        run: python telegram.py
